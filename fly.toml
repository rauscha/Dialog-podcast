# fly.toml — Fly.io deployment for the Dialog email webhook server
# Replace "dialog-podcast-webhook" with your actual Fly app name (must be globally unique).
# Run: fly launch --no-deploy  to create the app, then  fly deploy  to ship it.

app = "dialog-podcast-webhook"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
